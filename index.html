<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أكاديمية القناص المحترف - تدريب تكتيكي</title>
    <!-- تضمين مكتبة Tailwind CSS للتصميم العصري -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- خطوط جوجل لتحسين مظهر الخط العربي -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            touch-action: none; /* منع زوم الصفحة وحركاتها العشوائية على الموبايل */
            -webkit-tap-highlight-color: transparent;
        }
        canvas {
            cursor: none; /* إخفاء الماوس الافتراضي واستخدام عدسة القنص بدلاً منه */
        }
    </style>
</head>
<body class="bg-slate-950 text-white flex items-center justify-center min-h-screen overflow-hidden p-2 sm:p-4">

    <!-- الحاوية الرئيسية للعبة المجهزة لتناسب الهواتف والكمبيوتر -->
    <div class="relative w-full max-w-md aspect-[9/16] bg-slate-900 rounded-3xl overflow-hidden shadow-2xl border-2 border-emerald-500/30 flex flex-col select-none">
        
        <!-- واجهة البيانات العلوية (النقاط، الرصاص، الوقت) -->
        <div class="absolute top-0 inset-x-0 p-4 flex justify-between items-end z-20 bg-gradient-to-b from-slate-950/90 to-transparent pointer-events-none">
            <div class="flex flex-col">
                <span class="text-xs text-emerald-400 font-bold tracking-wider">النقاط</span>
                <span id="scoreText" class="text-2xl font-black text-white drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]">0</span>
            </div>
            
            <div class="flex flex-col items-center">
                <span class="text-xs text-amber-400 font-bold tracking-wider">الذخيرة</span>
                <span id="ammoText" class="text-xl font-black text-amber-300 drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]">5 / 5</span>
            </div>

            <div class="flex flex-col items-end">
                <span class="text-xs text-rose-400 font-bold tracking-wider">الوقت المتبقي</span>
                <span id="timerText" class="text-2xl font-black text-rose-400 drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]">60s</span>
            </div>
        </div>

        <!-- لوحة الرسم الخاصة باللعبة -->
        <canvas id="gameCanvas" class="absolute inset-0 w-full h-full block z-0"></canvas>

        <!-- مؤشر كتم الأنفاس المرئي -->
        <div class="absolute top-20 left-1/2 -translate-x-1/2 z-10 w-32 bg-slate-950/80 border border-slate-800 rounded-full h-3 overflow-hidden pointer-events-none hidden" id="breathBarContainer">
            <div id="breathBar" class="bg-cyan-400 h-full w-full transition-all duration-100"></div>
        </div>

        <!-- ================= شاشات الواجهة (Overlays) ================= -->

        <!-- 1. شاشة البدء الرئيسية -->
        <div id="startScreen" class="absolute inset-0 flex flex-col items-center justify-center p-6 bg-slate-950/90 z-40 transition-opacity duration-300">
            <div class="text-center space-y-6 max-w-xs">
                <!-- أيقونة تلسكوب/عدسة تصويب بالـ SVG كأصل فني ممتاز -->
                <div class="animate-pulse duration-1000 mx-auto w-24 h-24 text-emerald-400 drop-shadow-[0_0_15px_rgba(16,185,129,0.5)]">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="12" r="9" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v18M3 12h18" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                </div>
                <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-500 tracking-wide">قناص الأهداف الثنائية</h1>
                <p class="text-sm text-slate-400 leading-relaxed">أثبت مهاراتك الفائقة في التصويب السريع! أصب الأهداف الطائرة في المنتصف بدقة قبل انتهاء الوقت.</p>
                
                <!-- زر البدء المصلح -->
                <button id="startBtn" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 active:scale-95 text-white font-black text-lg py-4 px-8 rounded-2xl shadow-lg shadow-emerald-500/20 border-b-4 border-emerald-800 transition-all duration-150 transform pointer-events-auto cursor-pointer">
                    ابدأ التدريب 🎯
                </button>
            </div>
        </div>

        <!-- 2. شاشة نهاية اللعبة -->
        <div id="gameOverScreen" class="absolute inset-0 flex flex-col items-center justify-center p-6 bg-slate-950/95 z-40 transition-opacity duration-300 hidden">
            <div class="text-center space-y-6 max-w-xs">
                <div class="mx-auto w-20 h-20 text-yellow-500 drop-shadow-[0_0_15px_rgba(234,179,8,0.5)]">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 18.75h-9m9 0a3 3 0 013 3h-15a3 3 0 013-3m9 0v-3.375c0-.621-.503-1.125-1.125-1.125h-.75a1.125 1.125 0 01-1.125-1.125V11.25M7.5 18.75v-3.375c0-.621.503-1.125 1.125-1.125h.75m0 0A1.125 1.125 0 0110.5 11.25V11.25m-3 7.5h3.75M16.5 7.5V11.25m-9-3.75V11.25m9 0H7.5" />
                    </svg>
                </div>
                <h2 class="text-3xl font-black text-emerald-400">انتهى وقت التدريب!</h2>
                
                <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700/50 space-y-2">
                    <div class="flex justify-between items-center text-sm">
                        <span class="text-slate-400">مجموع الأهداف المصابة:</span>
                        <span id="finalScore" class="text-xl font-bold text-emerald-400">0</span>
                    </div>
                    <div class="flex justify-between items-center text-sm">
                        <span class="text-slate-400">أعلى دقة تصويب:</span>
                        <span id="highScore" class="text-xl font-bold text-yellow-400">0</span>
                    </div>
                </div>

                <!-- زر إعادة المحاولة -->
                <button id="restartBtn" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 active:scale-95 text-white font-black text-lg py-4 px-8 rounded-2xl shadow-lg shadow-emerald-500/20 border-b-4 border-emerald-800 transition-all duration-150 transform pointer-events-auto cursor-pointer">
                    إعادة التدريب 🔄
                </button>
            </div>
        </div>

        <!-- أزرار التحكم بأسفل الشاشة (ممتازة لتجربة الهاتف المحمول) -->
        <div class="absolute bottom-0 inset-x-0 p-6 flex justify-between items-center z-30 pointer-events-none gap-4 bg-gradient-to-t from-slate-950/95 via-slate-950/80 to-transparent">
            <!-- أزرار كتم الأنفاس وإعادة التلقيم -->
            <div class="flex gap-3 pointer-events-auto">
                <!-- كتم الأنفاس لموازنة الاهتزاز -->
                <button id="btnHoldBreath" class="w-16 h-16 bg-slate-800/90 active:bg-cyan-600/50 border-2 border-slate-700 active:border-cyan-400 text-white rounded-2xl flex flex-col items-center justify-center transition-all duration-75 transform active:scale-90">
                    <span class="text-[10px] font-bold text-cyan-400">كتم</span>
                    <span class="text-xs font-bold leading-none">الأنفاس</span>
                </button>
                <!-- إعادة تعبئة الرصاص -->
                <button id="btnReload" class="w-16 h-16 bg-slate-800/90 active:bg-amber-600/50 border-2 border-slate-700 active:border-amber-400 text-white rounded-2xl flex flex-col items-center justify-center transition-all duration-75 transform active:scale-90">
                    <span class="text-[10px] font-bold text-amber-400">تلقيم</span>
                    <span class="text-xs font-bold leading-none">الذخيرة</span>
                </button>
            </div>

            <!-- زر إطلاق النار الكبير -->
            <button id="btnShoot" class="pointer-events-auto w-20 h-20 bg-rose-600 active:bg-rose-500 border-2 border-rose-500 active:border-rose-300 text-white rounded-full flex items-center justify-center shadow-lg shadow-rose-600/30 font-black text-xl transition-all duration-75 transform active:scale-95">
                إطلاق
            </button>
        </div>

    </div>

    <!-- كود برمجة اللعبة بالكامل -->
    <script>
        // إعداد مؤثرات صوتية مخصصة للعبة القناص عبر Web Audio API
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'shoot') {
                // صوت إطلاق رصاصة قناص قوي وممتد قليلاً
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(220, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.35);
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.35);
            } else if (type === 'reload') {
                // صوت تلقيم الذخيرة (نقرتين معدنية)
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(500, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
                
                setTimeout(() => {
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(700, audioCtx.currentTime);
                    gain2.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    osc2.start();
                    osc2.stop(audioCtx.currentTime + 0.15);
                }, 150);
            } else if (type === 'hit') {
                // صوت إصابة الهدف المعدني بنجاح
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'empty') {
                // صوت محاولة الإطلاق بدون رصاص
                osc.type = 'sine';
                osc.frequency.setValueAtTime(120, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.08);
            } else if (type === 'breath') {
                // صوت نبضات قلب بطيئة دلالة على الهدوء وكتم الأنفاس
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(60, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
            } else if (type === 'click') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            // شاشات الواجهة
            const startScreen = document.getElementById('startScreen');
            const gameOverScreen = document.getElementById('gameOverScreen');
            const startBtn = document.getElementById('startBtn');
            const restartBtn = document.getElementById('restartBtn');

            // نصوص الواجهة
            const scoreText = document.getElementById('scoreText');
            const ammoText = document.getElementById('ammoText');
            const timerText = document.getElementById('timerText');
            const finalScore = document.getElementById('finalScore');
            const highScoreText = document.getElementById('highScore');

            // أشرطة كتم الأنفاس
            const breathBarContainer = document.getElementById('breathBarContainer');
            const breathBar = document.getElementById('breathBar');

            // أزرار التحكم التفاعلية
            const btnHoldBreath = document.getElementById('btnHoldBreath');
            const btnReload = document.getElementById('btnReload');
            const btnShoot = document.getElementById('btnShoot');

            // إعدادات اللعبة
            const STATE_START = 'START';
            const STATE_PLAYING = 'PLAYING';
            const STATE_GAMEOVER = 'GAMEOVER';
            let gameState = STATE_START;

            let score = 0;
            let ammo = 5;
            const maxAmmo = 5;
            let gameTime = 60; // 60 ثانية لكل دور تدريبي
            let gameInterval = null;
            let highscore = parseInt(localStorage.getItem('sniper_highscore') || '0');
            highScoreText.textContent = highscore;

            // هندسة التصويب
            let mouseX = 0;
            let mouseY = 0;
            let targetX = 0; // الإحداثيات المطلوبة لعدسة القنص
            let targetY = 0;

            // فيزياء الاهتزاز (Sway)
            let swayAngle = 0;
            let swayAmount = 25; // كمية الاهتزاز الافتراضية
            let isHoldingBreath = false;
            let breathEnergy = 100; // طاقة كتم الأنفاس المتاحة

            // كائنات اللعبة (الأهداف والمقذوفات والجزيئات المتناثرة)
            let targets = [];
            let particles = [];
            let bulletHoles = [];

            // ملاءمة حجم الشاشة والماوس
            function resizeCanvas() {
                const rect = canvas.parentElement.getBoundingClientRect();
                canvas.width = rect.width;
                canvas.height = rect.height;
                // ضبط المركز المبدئي للعدسة
                if (targetX === 0) {
                    targetX = canvas.width / 2;
                    targetY = canvas.height / 2;
                    mouseX = targetX;
                    mouseY = targetY;
                }
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // تتبع حركة الفأرة أو إصبع اللمس داخل لوحة الرسم لتوجيه عدسة القناص
            function updateReticlePosition(clientX, clientY) {
                const rect = canvas.getBoundingClientRect();
                // حساب الموقع بالنسبة للوحة الرسم
                mouseX = clientX - rect.left;
                mouseY = clientY - rect.top;
            }

            canvas.addEventListener('mousemove', (e) => {
                if (gameState === STATE_PLAYING) {
                    updateReticlePosition(e.clientX, e.clientY);
                }
            });

            // دعم اللمس للتحكم وحركة الإصبع على الموبايل
            canvas.addEventListener('touchmove', (e) => {
                if (gameState === STATE_PLAYING && e.touches.length > 0) {
                    e.preventDefault();
                    updateReticlePosition(e.touches[0].clientX, e.touches[0].clientY);
                }
            }, { passive: false });

            // ربط أحداث الكيبورد البديلة (لأجهزة اللابتوب والكمبيوتر)
            window.addEventListener('keydown', (e) => {
                if (gameState !== STATE_PLAYING) return;
                
                if (e.code === 'Space') {
                    // مسافة لكتم الأنفاس
                    e.preventDefault();
                    startHoldingBreath();
                }
                if (e.code === 'KeyR') {
                    // حرف R لإعادة التلقيم
                    reloadSniper();
                }
            });

            window.addEventListener('keyup', (e) => {
                if (e.code === 'Space') {
                    stopHoldingBreath();
                }
            });

            // نقر اللوحة للإطلاق السريع بالكمبيوتر
            canvas.addEventListener('mousedown', (e) => {
                if (gameState === STATE_PLAYING) {
                    shootSniper();
                }
            });

            // ربط الأزرار بطريقة آمنة تمنع التعليق
            function bindButton(element, action) {
                element.addEventListener('click', (e) => {
                    e.stopPropagation();
                    playSound('click');
                    action();
                });
                element.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    playSound('click');
                    action();
                }, { passive: false });
            }

            bindButton(startBtn, () => {
                startGame();
            });

            bindButton(restartBtn, () => {
                startGame();
            });

            // أزرار التحكم باللمس السفلية
            bindButton(btnReload, () => {
                reloadSniper();
            });

            bindButton(btnShoot, () => {
                shootSniper();
            });

            // كتم الأنفاس للموبايل بالضغط المستمر
            btnHoldBreath.addEventListener('touchstart', (e) => {
                e.preventDefault();
                startHoldingBreath();
            });
            btnHoldBreath.addEventListener('touchend', (e) => {
                e.preventDefault();
                stopHoldingBreath();
            });
            btnHoldBreath.addEventListener('mousedown', () => startHoldingBreath());
            btnHoldBreath.addEventListener('mouseup', () => stopHoldingBreath());
            btnHoldBreath.addEventListener('mouseleave', () => stopHoldingBreath());

            function startHoldingBreath() {
                if (breathEnergy > 20) {
                    isHoldingBreath = true;
                    swayAmount = 3; // اهتزاز شبه منعدم
                    breathBarContainer.classList.remove('hidden');
                    playSound('breath');
                }
            }

            function stopHoldingBreath() {
                isHoldingBreath = false;
                swayAmount = 25; // عودة الاهتزاز العادي
            }

            // وظيفة إعادة التلقيم
            let isReloading = false;
            function reloadSniper() {
                if (ammo === maxAmmo || isReloading) return;
                isReloading = true;
                ammoText.textContent = "جاري التلقيم...";
                playSound('reload');
                setTimeout(() => {
                    ammo = maxAmmo;
                    updateAmmoUI();
                    isReloading = false;
                }, 1000);
            }

            function updateAmmoUI() {
                ammoText.textContent = `${ammo} / ${maxAmmo}`;
            }

            // وظيفة إطلاق الرصاصة
            function shootSniper() {
                if (isReloading) return;
                if (ammo <= 0) {
                    playSound('empty');
                    return;
                }

                ammo--;
                updateAmmoUI();
                playSound('shoot');

                // إضافة تأثير اهتزاز الارتداد القوي للعدسة (Recoil)
                targetY -= 50;

                // إحداث ثقب رصاصة عند نقطة التصويب الحالية للعدسة
                const hitX = targetX;
                const hitY = targetY;
                
                bulletHoles.push({
                    x: hitX,
                    y: hitY,
                    alpha: 1.0,
                    time: 150 // يدوم لبعض الوقت على الشاشة
                });

                // التحقق من إصابة أحد الأهداف المتواجدة
                let hitTargetIndex = -1;
                let highestHitScore = 0;

                for (let i = targets.length - 1; i >= 0; i--) {
                    const t = targets[i];
                    const dist = Math.hypot(hitX - t.x, hitY - t.y);

                    if (dist < t.radius) {
                        // حساب دقة الإصابة من 10 إلى 100 نقطة
                        const accuracy = 1 - (dist / t.radius);
                        const points = Math.ceil(accuracy * 10) * 10;
                        
                        if (points > highestHitScore) {
                            highestHitScore = points;
                            hitTargetIndex = i;
                        }
                    }
                }

                // معالجة إصابة الهدف بنجاح
                if (hitTargetIndex !== -1) {
                    const hitTarget = targets[hitTargetIndex];
                    score += highestHitScore;
                    scoreText.textContent = score;
                    playSound('hit');

                    // توليد شرارات تأثيرية ممتعة
                    createSparks(hitTarget.x, hitTarget.y, hitTarget.color);

                    // كتابة عبارة دقة التصويب في مكان الإصابة
                    let text = "جيد! +50";
                    if (highestHitScore >= 90) text = "🎯 مذهل! 100+";
                    else if (highestHitScore >= 70) text = "قريب جداً! +80";

                    particles.push({
                        x: hitTarget.x,
                        y: hitTarget.y - 20,
                        text: text,
                        color: '#34d399',
                        alpha: 1,
                        type: 'text',
                        vy: -1.5
                    });

                    // حذف الهدف المصاب
                    targets.splice(hitTargetIndex, 1);
                }
            }

            // إنشاء شرارات متطايرة ملونة عند إصابة الهدف
            function createSparks(x, y, color) {
                for (let i = 0; i < 15; i++) {
                    particles.push({
                        x: x,
                        y: y,
                        vx: (Math.random() - 0.5) * 8,
                        vy: (Math.random() - 0.5) * 8,
                        radius: 2 + Math.random() * 3,
                        alpha: 1,
                        decay: 0.03 + Math.random() * 0.04,
                        color: color,
                        type: 'spark'
                    });
                }
            }

            // بدء اللعبة وتجهيز المتغيرات والوقت
            function startGame() {
                score = 0;
                ammo = maxAmmo;
                gameTime = 60;
                targets = [];
                particles = [];
                bulletHoles = [];
                isHoldingBreath = false;
                breathEnergy = 100;

                scoreText.textContent = score;
                updateAmmoUI();
                timerText.textContent = `${gameTime}s`;

                gameState = STATE_PLAYING;
                startScreen.classList.add('hidden');
                gameOverScreen.classList.add('hidden');

                // تفعيل عداد تناقص الوقت التنازلي
                if (gameInterval) clearInterval(gameInterval);
                gameInterval = setInterval(() => {
                    if (gameState === STATE_PLAYING) {
                        gameTime--;
                        timerText.textContent = `${gameTime}s`;
                        if (gameTime <= 0) {
                            endGame();
                        }
                    }
                }, 1000);
            }

            // انتهاء الوقت وحفظ النتيجة القياسية
            function endGame() {
                gameState = STATE_GAMEOVER;
                clearInterval(gameInterval);
                finalScore.textContent = score;
                if (score > highscore) {
                    highscore = score;
                    localStorage.setItem('sniper_highscore', highscore);
                }
                highScoreText.textContent = highscore;
                gameOverScreen.classList.remove('hidden');
                breathBarContainer.classList.add('hidden');
            }

            // إنشاء أهداف دورية جديدة بمواقع وألوان مختلفة
            let targetSpawnTimer = 0;
            function spawnTarget() {
                const radius = 25 + Math.random() * 15;
                const x = radius + Math.random() * (canvas.width - radius * 2);
                const y = radius + Math.random() * (canvas.height - 200 - radius * 2) + 80;
                
                // تحديد اتجاهات الحركة عشوائياً للأهداف الطائرة
                targets.push({
                    x: x,
                    y: y,
                    radius: radius,
                    color: `hsl(${Math.random() * 360}, 85%, 55%)`,
                    vx: (Math.random() - 0.5) * 3,
                    vy: (Math.random() - 0.5) * 2,
                    pulse: Math.random() * Math.PI
                });
            }

            // تحديث فيزياء اللعبة وحركة العناصر في الفريم الحالي
            function update() {
                if (gameState !== STATE_PLAYING) return;

                // تحديث طاقة كتم الأنفاس
                if (isHoldingBreath) {
                    breathEnergy -= 1.5; // استهلاك الطاقة تدريجياً
                    if (breathEnergy <= 0) {
                        stopHoldingBreath();
                    }
                } else {
                    if (breathEnergy < 100) breathEnergy += 0.8; // استعادة الطاقة
                }
                
                // تحديث شريط كتم الأنفاس المرئي
                breathBar.style.width = `${breathEnergy}%`;
                if (breathEnergy < 30) {
                    breathBar.className = "bg-rose-500 h-full w-full transition-all duration-100";
                } else {
                    breathBar.className = "bg-cyan-400 h-full w-full transition-all duration-100";
                }

                // حساب ومحاكاة اهتزاز العدسة الفيزيائي (Sway)
                swayAngle += 0.05;
                const swayX = Math.sin(swayAngle * 2) * (swayAmount * 0.5);
                const swayY = Math.cos(swayAngle) * swayAmount;

                // تقريب عدسة القنص تدريجياً وبسلاسة لموقع الماوس/الإصبع مع إضافة اهتزاز التنفس
                const destX = mouseX + swayX;
                const destY = mouseY + swayY;
                targetX += (destX - targetX) * 0.12;
                targetY += (destY - targetY) * 0.12;

                // توليد أهداف جديدة عند الحاجة (أقصى حد 5 أهداف على الشاشة معاً)
                targetSpawnTimer++;
                if (targetSpawnTimer > 50 && targets.length < 5) {
                    spawnTarget();
                    targetSpawnTimer = 0;
                }

                // تحديث حركة وحركة ارتداد الأهداف الطائرة داخل حدود التدريب
                targets.forEach(t => {
                    t.x += t.vx;
                    t.y += t.vy;
                    t.pulse += 0.04;

                    // الارتداد من الجوانب الأفقية
                    if (t.x - t.radius < 0 || t.x + t.radius > canvas.width) {
                        t.vx *= -1;
                    }
                    // الارتداد عمودياً مع البقاء في منطقة التدريب العلوية والوسطى
                    if (t.y - t.radius < 80 || t.y + t.radius > canvas.height - 180) {
                        t.vy *= -1;
                    }
                });

                // تحديث جزيئات الانفجارات وشرارات الضوء
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    if (p.type === 'spark') {
                        p.x += p.vx;
                        p.y += p.vy;
                        p.alpha -= p.decay;
                    } else if (p.type === 'text') {
                        p.y += p.vy;
                        p.alpha -= 0.02;
                    }
                    if (p.alpha <= 0) {
                        particles.splice(i, 1);
                    }
                }

                // تحديث ومسح ثقوب الرصاص القديمة
                for (let i = bulletHoles.length - 1; i >= 0; i--) {
                    bulletHoles[i].time--;
                    if (bulletHoles[i].time <= 0) {
                        bulletHoles.splice(i, 1);
                    }
                }
            }

            // رسم كل التفاصيل الممتعة والمركبة على شاشة اللعبة
            function draw() {
                // 1. مسح وتلوين الخلفية بنمط مظلم ومستقبلي (ميدان تصويب)
                ctx.fillStyle = '#090d16';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // رسم خطوط شبكة تدريبية (Grid) بالخلفية لإعطاء طابع رقمي ثلاثي الأبعاد
                ctx.strokeStyle = '#1e293b';
                ctx.lineWidth = 1;
                for (let x = 0; x < canvas.width; x += 40) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, canvas.height);
                    ctx.stroke();
                }
                for (let y = 0; y < canvas.height; y += 40) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(canvas.width, y);
                    ctx.stroke();
                }

                // رسم حبل لتعليق اللوحات أو منصة بالأسفل لإعطاء لمسة عمق للميدان
                ctx.fillStyle = '#1e293b';
                ctx.fillRect(0, canvas.height - 175, canvas.width, 10);

                // 2. رسم الأهداف التكتيكية الطائرة (لوحات التهديف الدائرية الملونة)
                targets.forEach(t => {
                    ctx.save();
                    const currentRadius = t.radius + Math.sin(t.pulse) * 1.5;

                    // تأثير تظليل دائرى لإعطاء شكل ثلاثي أبعاد مجسم
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = t.color;

                    // رسم حلقة الدائرة الخارجية
                    ctx.fillStyle = t.color;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, currentRadius, 0, Math.PI * 2);
                    ctx.fill();

                    // حلقة بيضاء داخلية
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, currentRadius * 0.7, 0, Math.PI * 2);
                    ctx.fill();

                    // حلقة ملونة ثانية
                    ctx.fillStyle = t.color;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, currentRadius * 0.4, 0, Math.PI * 2);
                    ctx.fill();

                    // المنتصف الأصفر الذهبي الـ Bullseye!
                    ctx.fillStyle = '#fbbf24';
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, currentRadius * 0.15, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.restore();
                });

                // 3. رسم ثقوب الرصاص التفاعلية عند الإصابات
                bulletHoles.forEach(h => {
                    ctx.save();
                    ctx.globalAlpha = h.alpha;
                    // حلقة خارجية متصدعة
                    ctx.strokeStyle = '#ef4444';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(h.x, h.y, 8, 0, Math.PI * 2);
                    ctx.stroke();

                    // مركز الثقب الأسود العميق لمرور الرصاصة
                    ctx.fillStyle = '#000000';
                    ctx.beginPath();
                    ctx.arc(h.x, h.y, 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                });

                // 4. رسم الجزيئات المتطايرة وعبارات التقييم
                particles.forEach(p => {
                    ctx.save();
                    ctx.globalAlpha = p.alpha;
                    if (p.type === 'spark') {
                        ctx.fillStyle = p.color;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (p.type === 'text') {
                        ctx.fillStyle = p.color;
                        ctx.font = '900 16px Cairo, sans-serif';
                        ctx.textAlign = 'center';
                        ctx.fillText(p.text, p.x, p.y);
                    }
                    ctx.restore();
                });

                // 5. رسم عدسة القنص المستقبلية المحاكية بدقة فائقة (Sniper Reticle Overlay)
                if (gameState === STATE_PLAYING) {
                    ctx.save();
                    const rX = targetX;
                    const rY = targetY;

                    // تعتيم خفيف للشاشة خارج عدسة القناص لمحاكاة الرؤية الضيقة التلسكوبية
                    const grad = ctx.createRadialGradient(rX, rY, 40, rX, rY, 130);
                    grad.addColorStop(0, 'rgba(0,0,0,0)');
                    grad.addColorStop(0.85, 'rgba(9,13,22,0.4)');
                    grad.addColorStop(1, 'rgba(9,13,22,0.95)');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // رسم محيط العدسة الدائرية الرئيسية باللون الأخضر التكتيكي المشع
                    ctx.strokeStyle = isHoldingBreath ? '#22d3ee' : '#10b981';
                    ctx.lineWidth = 3;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = ctx.strokeStyle;
                    
                    ctx.beginPath();
                    ctx.arc(rX, rY, 80, 0, Math.PI * 2);
                    ctx.stroke();

                    // رسم الشعيرات المتصالبة الكلاسيكية الدقيقة (Crosshairs) داخل العدسة
                    ctx.lineWidth = 1;
                    ctx.shadowBlur = 0;

                    // شعيرات أفقية ورأسية لا تتصادم في المركز التام
                    ctx.beginPath();
                    // يسار
                    ctx.moveTo(rX - 80, rY);
                    ctx.lineTo(rX - 10, rY);
                    // يمين
                    ctx.moveTo(rX + 10, rY);
                    ctx.lineTo(rX + 80, rY);
                    // أعلى
                    ctx.moveTo(rX, rY - 80);
                    ctx.lineTo(rX, rY - 10);
                    // أسفل
                    ctx.moveTo(rX, rY + 10);
                    ctx.lineTo(rX, rY + 80);
                    ctx.stroke();

                    // رسم تدرجات قياس المدى الجانبية (Mildots) داخل العدسة
                    ctx.fillStyle = ctx.strokeStyle;
                    for (let d = 20; d < 80; d += 15) {
                        ctx.fillRect(rX + d - 1, rY - 2, 2, 4);
                        ctx.fillRect(rX - d - 1, rY - 2, 2, 4);
                        ctx.fillRect(rX - 2, rY + d - 1, 4, 2);
                        ctx.fillRect(rX - 2, rY - d - 1, 4, 2);
                    }

                    // نقطة التصويب المركزية الفائقة الصغر (Red Dot)
                    ctx.fillStyle = '#f43f5e';
                    ctx.beginPath();
                    ctx.arc(rX, rY, 2.5, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.restore();
                }
            }

            // حلقة اللعبة المستمرة (Game Loop)
            function loop() {
                update();
                draw();
                requestAnimationFrame(loop);
            }

            loop();
        });
    </script>
